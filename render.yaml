services:
  - type: web
    name: gadgetflex-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://gadgetflex.vercel.app
